---
version: 2
before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: chproxy
    binary: chproxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - "-tags={{ .Env.BUILD_TAG }}"
    ldflags:
      - -s
      - -w
      - -X main.buildTime={{ .Date }}
      - -X main.buildRevision={{ .FullCommit }}
      - -X main.buildTag={{ .Version }}
    gcflags:
      - -trimpath={{.Env.GOPATH}}/src

snapshot:
  version_template: "{{ .FullCommit }}-SNAPSHOT"

release:
  # github.owner/name omitted intentionally so goreleaser publishes to the
  # origin remote (Barestack-io/chproxy in this fork).
  draft: false
